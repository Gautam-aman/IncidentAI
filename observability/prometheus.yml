global:
  scrape_interval: 15s

scrape_configs:

  - job_name: ticket-service

    metrics_path: /actuator/prometheus

    static_configs:
      - targets:
          - host.docker.internal:8082

  - job_name: auth-service

    metrics_path: /actuator/prometheus

    static_configs:
      - targets:
          - host.docker.internal:8081

  - job_name: gateway-service

    metrics_path: /actuator/prometheus

    static_configs:
      - targets:
          - host.docker.internal:8080
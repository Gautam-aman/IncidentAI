global:
  scrape_interval: 15s

scrape_configs:

  - job_name: ticket-service

    metrics_path: /actuator/prometheus

    static_configs:
      - targets:
          - ticket-service:8082

  - job_name: auth-service

    metrics_path: /actuator/prometheus

    static_configs:
      - targets:
          - auth-service:8081

  - job_name: gateway-service

    metrics_path: /actuator/prometheus

    static_configs:
      - targets:
          - gateway-service:8080

  - job_name: search-service

    metrics_path: /actuator/prometheus

    static_configs:
      - targets:
          - search-service:8085

  - job_name: notification-service

    metrics_path: /actuator/prometheus

    static_configs:
      - targets:
          - notification-service:8084

  - job_name: chat-service

    metrics_path: /actuator/prometheus

    static_configs:
      - targets:
          - chat-service:8086

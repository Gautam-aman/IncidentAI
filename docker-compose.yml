services:

  postgres:
    image: postgres:16
    container_name: incident-postgres

    environment:
      POSTGRES_DB: incident_auth_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_MULTIPLE_DATABASES: incident_ticket_db

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres:/docker-entrypoint-initdb.d

  redis:
    image: redis:7
    container_name: incident-redis

    ports:
      - "6379:6379"
  auth-service:
    build: ./auth-service
    depends_on:
      - postgres
      - redis
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/incident_auth_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_DATA_REDIS_HOST: redis
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://jaeger:4318/v1/traces

    ports:
      - "8081:8081"

  gateway-service:
    build: ./gateway-service
    depends_on:
      - auth-service
      - ticket-service
      - search-service
      - notification-service
      - chat-service
      - rag-service
    environment:
      AUTH_SERVICE_URI: http://auth-service:8081
      TICKET_SERVICE_URI: http://ticket-service:8082
      SEARCH_SERVICE_URI: http://search-service:8085
      NOTIFICATION_SERVICE_URI: http://notification-service:8084
      CHAT_SERVICE_URI: http://chat-service:8086
      RAG_SERVICE_URI: http://rag-service:8000
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://jaeger:4318/v1/traces

    ports:
        - "8080:8080"

  ticket-service:
    build: ./ticket-service
    depends_on:
      - postgres
      - kafka
      - jaeger
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/incident_ticket_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://jaeger:4318/v1/traces
    ports:
      - "8082:8082"

  search-service:
    build: ./search-service
    depends_on:
      - elasticsearch
      - kafka
    environment:
      SPRING_ELASTICSEARCH_URIS: http://elasticsearch:9200
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://jaeger:4318/v1/traces
    ports:
      - "8085:8085"

  notification-service:
    build: ./notification-service
    depends_on:
      - kafka
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://jaeger:4318/v1/traces
    ports:
      - "8084:8084"

  chat-service:
    build: ./chat-service
    depends_on:
      - redis
    environment:
      SPRING_DATA_REDIS_HOST: redis
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://jaeger:4318/v1/traces
    ports:
      - "8086:8086"

  rag-service:
    build: ./rag-service
    depends_on:
      - qdrant
    environment:
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
    ports:
      - "8000:8000"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0

    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0

    depends_on:
      - zookeeper

    ports:
      - "9092:9092"

    environment:
      KAFKA_BROKER_ID: 1

      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4

    container_name: incident-elasticsearch

    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m

    ports:
      - "9200:9200"

  qdrant:
    image: qdrant/qdrant

    container_name: incident-qdrant

    ports:
       - "6333:6333"

    volumes:
     - qdrant_storage:/qdrant/storage

  prometheus:
    image: prom/prometheus

    container_name: prometheus

    ports:
      - "9090:9090"

    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:11.0.0

    container_name: grafana

    ports:
      - "3000:3000"

    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin

    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning

    depends_on:
      - prometheus
      - jaeger

  kibana:

    image: docker.elastic.co/kibana/kibana:8.13.4

    ports:
      - "5601:5601"

    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200

    depends_on:
      - elasticsearch

  logstash:

    image: docker.elastic.co/logstash/logstash:8.13.4

    ports:
      - "5000:5000"

    volumes:
      - ./observability/logstash.conf:/usr/share/logstash/pipeline/logstash.conf

    depends_on:
      - elasticsearch
  jaeger:

    image: jaegertracing/all-in-one:1.57

    container_name: jaeger

    ports:
      - "16686:16686"
      - "4318:4318"



volumes:
  postgres_data:
  qdrant_storage:
  grafana_data:

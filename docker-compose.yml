version: '3.8'

services:

  postgres:
    image: postgres:16
    container_name: incident-postgres

    environment:
      POSTGRES_DB: incident_auth_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: incident-redis

    ports:
      - "6379:6379"
  auth-service:
    build: ./auth-service

    ports:
      - "8081:8081"

  gateway-service:
    build: ./gateway-service

    ports:
        - "8080:8080"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0

    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0

    depends_on:
      - zookeeper

    ports:
      - "9092:9092"

    environment:
      KAFKA_BROKER_ID: 1

      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4

    container_name: incident-elasticsearch

    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m

    ports:
      - "9200:9200"

  qdrant:
    image: qdrant/qdrant

    container_name: incident-qdrant

    ports:
       - "6333:6333"

    volumes:
     - qdrant_storage:/qdrant/storage

  prometheus:
    image: prom/prometheus

    container_name: prometheus

    ports:
      - "9090:9090"

    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml

  kibana:

    image: docker.elastic.co/kibana/kibana:8.13.4

    ports:
      - "5601:5601"

    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200

    depends_on:
      - elasticsearch

  logstash:

    image: docker.elastic.co/logstash/logstash:8.13.4

    ports:
      - "5000:5000"

    volumes:
      - ./observability/logstash.conf:/usr/share/logstash/pipeline/logstash.conf

    depends_on:
      - elasticsearch



volumes:
  postgres_data:
  qdrant_storage:
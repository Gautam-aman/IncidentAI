version: '3.8'

services:

  postgres:
    image: postgres:16
    container_name: incident-postgres

    environment:
      POSTGRES_DB: incident_auth_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: incident-redis

    ports:
      - "6379:6379"
  auth-service:
    build: ./auth-service

    ports:
      - "8081:8081"

  gateway-service:
    build: ./gateway-service

    ports:
        - "8080:8080"

volumes:
  postgres_data:
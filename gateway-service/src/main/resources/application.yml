server:
  port: 8080

spring:
  application:
    name: gateway-service

  cloud:
    gateway:
      server:
        webflux:
          globalcors:
            add-to-simple-url-handler-mapping: true
            cors-configurations:
              '[/**]':
                allowedOriginPatterns:
                  - "*"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - OPTIONS
                allowedHeaders:
                  - "*"

          routes:

            - id: auth-health
              uri: ${AUTH_SERVICE_URI:http://localhost:8081}
              predicates:
                - Path=/monitor/auth/health
              filters:
                - SetPath=/actuator/health

            - id: ticket-health
              uri: ${TICKET_SERVICE_URI:http://localhost:8082}
              predicates:
                - Path=/monitor/ticket/health
              filters:
                - SetPath=/actuator/health

            - id: search-health
              uri: ${SEARCH_SERVICE_URI:http://localhost:8085}
              predicates:
                - Path=/monitor/search/health
              filters:
                - SetPath=/actuator/health

            - id: notification-health
              uri: ${NOTIFICATION_SERVICE_URI:http://localhost:8084}
              predicates:
                - Path=/monitor/notification/health
              filters:
                - SetPath=/actuator/health

            - id: chat-health
              uri: ${CHAT_SERVICE_URI:http://localhost:8086}
              predicates:
                - Path=/monitor/chat/health
              filters:
                - SetPath=/actuator/health

            - id: rag-health
              uri: ${RAG_SERVICE_URI:http://localhost:8000}
              predicates:
                - Path=/monitor/rag/health
              filters:
                - SetPath=/

            - id: chat-service

              uri: ${CHAT_SERVICE_URI:http://localhost:8086}

              predicates:
                - Path=/ws/**,/api/chat/**

            - id: auth-service

              uri: ${AUTH_SERVICE_URI:http://localhost:8081}

              predicates:
                - Path=/api/auth/**

            - id: ticket-service

              uri: ${TICKET_SERVICE_URI:http://localhost:8082}

              predicates:
                - Path=/api/incidents/**

            - id: search-service

              uri: ${SEARCH_SERVICE_URI:http://localhost:8085}

              predicates:
                - Path=/api/search/**

            - id: notification-service

              uri: ${NOTIFICATION_SERVICE_URI:http://localhost:8084}

              predicates:
                - Path=/api/notifications/**

            - id: rag-service

              uri: ${RAG_SERVICE_URI:http://localhost:8000}

              predicates:
                - Path=/api/upload,/api/ask

management:
  prometheus:
    metrics:
      export:
        enabled: true
  tracing:
    sampling:
      probability: 1.0
    otlp:
      tracing:
        endpoint: ${MANAGEMENT_OTLP_TRACING_ENDPOINT:http://localhost:4318/v1/traces}
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: gateway-service

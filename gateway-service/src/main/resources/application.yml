server:
  port: 8080

spring:
  application:
    name: gateway-service

  cloud:
    gateway:

      routes:

        - id: chat-service

          uri: http://localhost:8086

          predicates:
            - Path=/ws/**,/api/chat/**

        - id: auth-service

          uri: http://localhost:8081

          predicates:
            - Path=/api/auth/**